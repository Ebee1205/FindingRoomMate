<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>설문조사 결과</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f7f7f7;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .result-item {
            margin-bottom: 15px;
        }
        .result-label {
            font-weight: bold;
            color: #555;
        }
        .result-value {
            color: #333;
        }
        #download-btn {
            display: block;
            width: auto;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 4px;
            text-align: center;
        }
        #download-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>설문조사 결과</h1>
        {% for key, value in data.items() %}
        <div class="result-item">
            <span class="result-label">{{ key }}:</span>
            <span class="result-value">{{ value }}</span>
        </div>
        {% endfor %}
        <a id="download-btn" href="/download_image">이미지로 다운로드</a>
    </div>
</body>
</html>
