<!DOCTYPE html>
<html>
    <head>
        <title>기숙사 룸메이트 설문지 - 페이지 2</title>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/styles.css') }}">
    </head>
<body>
    <div class="container">
        <h1>기숙사 룸메이트 설문지 - 페이지 2</h1>
        <form id="survey-form" action="{{ url_for('survey_page2') }}" method="post">
            <div class="form-group">
                <label for="mbti_1">MBTI (I/E):</label>
                <select id="mbti_1" name="mbti_1">
                    <option value="I">I</option>
                    <option value="E">E</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mbti_2">MBTI (N/S):</label>
                <select id="mbti_2" name="mbti_2">
                    <option value="N">N</option>
                    <option value="S">S</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mbti_3">MBTI (F/T):</label>
                <select id="mbti_3" name="mbti_3">
                    <option value="F">F</option>
                    <option value="T">T</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mbti_4">MBTI (P/J):</label>
                <select id="mbti_4" name="mbti_4">
                    <option value="P">P</option>
                    <option value="J">J</option>
                </select>
            </div>
            <div class="form-group">
                <label for="roommate_relationship">원하는 룸메와의 관계:</label>
                <select id="roommate_relationship" name="roommate_relationship">
                    <option value="친함">친함</option>
                    <option value="각자 알아서">각자 알아서</option>
                </select>
            </div>
        </form>
        <div class="button-container">
            <form action="{{ url_for('survey_page1') }}" method="get">
                <button type="submit">이전</button>
            </form>
            <form action="{{ url_for('survey_page3') }}" method="post">
                <button type="submit" form="survey-form">다음</button>
            </form>
        </div>
    </div>
</body>
</html>
