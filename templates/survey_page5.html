<!DOCTYPE html>
<html>
<head>
    <title>기숙사 룸메이트 설문지 - 페이지 5</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>기숙사 룸메이트 설문지 - 페이지 5</h1>
        <form id="survey-form" action="{{ url_for('survey_page5') }}" method="post">
            <div class="form-group">
                <label for="smoking">흡연 여부:</label>
                <select id="smoking" name="smoking">
                    <option value="O">O</option>
                    <option value="X">X</option>
                    <option value="가끔">가끔</option>
                </select>
            </div>
            <div class="form-group">
                <label for="drinking_frequency">음주 빈도:</label>
                <select id="drinking_frequency" name="drinking_frequency">
                    <option value="X">X</option>
                    <option value="자주">자주</option>
                    <option value="때때로">때때로</option>
                    <option value="매일">매일</option>
                </select>
            </div>
            <div class="form-group">
                <label for="drinking_habits">술 주사:</label>
                <textarea id="drinking_habits" name="drinking_habits" rows="4"></textarea>
            </div>
        </form>
        <div class="button-container">
            <form action="{{ url_for('survey_page4') }}" method="get">
                <button type="submit">이전</button>
            </form>
            <form action="{{ url_for('survey_page6') }}" method="post">
                <button type="submit" form="survey-form">다음</button>
            </form>
        </div>
    </div>
</body>
</html>
