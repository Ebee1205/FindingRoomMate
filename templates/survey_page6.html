<!DOCTYPE html>
<html>
<head>
    <title>기숙사 룸메이트 설문지 - 페이지 6</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="progress-container">
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle"></div></div>
            <div class="progress-step"><div class="progress-circle"></div></div>
        </div>
        <h1>기숙사 룸메이트 설문지 - 페이지 6</h1>
        <form id="survey-form" action="{{ url_for('survey_page6') }}" method="post">
            <div class="form-group">
                <label for="bug_handling">벌레:</label>
                <select id="bug_handling" name="bug_handling">
                    <option value="못잡음">못잡음</option>
                    <option value="작은거가능">작은거가능</option>
                    <option value="벌레헌터">벌레헌터</option>
                </select>
            </div>
            <div class="form-group">
                <label for="roommate_relationship">원하는 룸메와의 관계:</label>
                <select id="roommate_relationship" name="roommate_relationship">
                    <option value="친함">친함</option>
                    <option value="각자 알아서">각자 알아서</option>
                </select>
            </div>
        </form>
        <div class="button-container">
            <form action="{{ url_for('survey_page5') }}" method="get">
                <button type="submit">이전</button>
            </form>
            <form action="{{ url_for('survey_page7') }}" method="post">
                <button type="submit" form="survey-form">다음</button>
            </form>
        </div>
    </div>
</body>
</html>
