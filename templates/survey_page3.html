<!DOCTYPE html>
<html>
<head>
    <title>기숙사 룸메이트 설문지 - 페이지 3</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/styles.css') }}">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggles = document.querySelectorAll('.toggle');
            toggles.forEach(function(toggle) {
                toggle.addEventListener('click', function() {
                    toggle.classList.toggle('on');
                    var input = toggle.nextElementSibling;
                    input.value = toggle.classList.contains('on') ? input.getAttribute('data-on') : input.getAttribute('data-off');
                });
            });

            var sensitivityButtons = document.querySelectorAll('.value-five-button');
            sensitivityButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    sensitivityButtons.forEach(function(btn) {
                        btn.classList.remove('active');
                    });
                    button.classList.add('active');
                    document.getElementById('sleep_sensitivity').value = button.getAttribute('data-value');
                });
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <h1>기숙사 룸메이트 설문지 - 페이지 3</h1>
        <div class="progress-container">
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle active"></div></div>
            <div class="progress-step"><div class="progress-circle"></div></div>
            <div class="progress-step"><div class="progress-circle"></div></div>
            <div class="progress-step"><div class="progress-circle"></div></div>
            <div class="progress-step"><div class="progress-circle"></div></div>
            <div class="progress-step"><div class="progress-circle"></div></div>
        </div>
        <form id="survey-form" action="{{ url_for('survey_page3') }}" method="post">
            <div class="form-group">
                <label for="bedtime">취침시간:</label>
                <input type="time" id="bedtime" name="bedtime">
            </div>
            <div class="form-group">
                <label for="lights_off">불 끄는 시간:</label>
                <input type="time" id="lights_off" name="lights_off">
            </div>
            <div class="form-group">
                <label for="wakeup_time">기상시간:</label>
                <input type="time" id="wakeup_time" name="wakeup_time">
            </div>
            <div class="form-group">
                <label for="sleep_habits">잠버릇:</label>
                <select id="sleep_habits" name="sleep_habits">
                    <option value="없음">없음</option>
                    <option value="이갈이">이갈이</option>
                    <option value="코골이">코골이</option>
                    <option value="잠꼬대">잠꼬대</option>
                </select>
            </div>
            <div class="form-group">
                <label for="sleep_sensitivity">잠귀 (1-5):</label>
                <div class="value-five-buttons">
                    <button type="button" class="value-five-button" data-value="1">1</button>
                    <div class="value-five-bar"></div>
                    <button type="button" class="value-five-button" data-value="2">2</button>
                    <div class="value-five-bar"></div>
                    <button type="button" class="value-five-button" data-value="3">3</button>
                    <div class="value-five-bar"></div>
                    <button type="button" class="value-five-button" data-value="4">4</button>
                    <div class="value-five-bar"></div>
                    <button type="button" class="value-five-button" data-value="5">5</button>
                </div>
                <input type="hidden" id="sleep_sensitivity" name="sleep_sensitivity" value="">
            </div>
            <div class="form-group">
                <label for="morning_alarm">아침 알람:</label>
                <select id="morning_alarm" name="morning_alarm">
                    <option value="X">X</option>
                    <option value="바로끄면 ㄱㅊ">바로끄면 ㄱㅊ</option>
                    <option value="알람 시간 상의 필요">알람 시간 상의 필요</option>
                    <option value="상관없음">상관없음</option>
                </select>
            </div>
        </form>
        <div class="button-container">
            <form action="{{ url_for('survey_page2') }}" method="get">
                <button type="submit">이전</button>
            </form>
            <form action="{{ url_for('survey_page4') }}" method="post">
                <button type="submit" form="survey-form">다음</button>
            </form>
        </div>
    </div>
</body>
</html>
