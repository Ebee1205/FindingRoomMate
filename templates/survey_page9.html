<!DOCTYPE html>
<html>
<head>
    <title>기숙사 룸메이트 설문지 - 페이지 9</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f7f7f7;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        input[type="submit"] {
            width: auto;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 4px;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>기숙사 룸메이트 설문지 - 페이지 9</h1>
        <form action="" method="post">
            <div class="form-group">
                <label for="bedtime">취침시간:</label>
                <input type="time" id="bedtime" name="bedtime">
            </div>
            <div class="form-group">
                <label for="lights_off">불 끄는 시간:</label>
                <input type="time" id="lights_off" name="lights_off">
            </div>
            <div class="form-group">
                <label for="wakeup_time">기상시간:</label>
                <input type="time" id="wakeup_time" name="wakeup_time">
            </div>
            <div class="form-group">
                <label for="sleep_habits">잠버릇:</label>
                <select id="sleep_habits" name="sleep_habits">
                    <option value="없음">없음</option>
                    <option value="이갈이">이갈이</option>
                    <option value="코골이">코골이</option>
                    <option value="잠꼬대">잠꼬대</option>
                </select>
            </div>
            <div class="form-group">
                <label for="sleep_sensitivity">잠귀 (1-5):</label>
                <input type="number" id="sleep_sensitivity" name="sleep_sensitivity" min="1" max="5">
            </div>
            <div class="form-group">
                <label for="morning_alarm">아침 알람:</label>
                <select id="morning_alarm" name="morning_alarm">
                    <option value="X">X</option>
                    <option value="바로끄면 ㄱㅊ">바로끄면 ㄱㅊ</option>
                    <option value="알람 시간 상의 필요">알람 시간 상의 필요</option>
                    <option value="상관없음">상관없음</option>
                </select>
            </div>
            <input type="submit" value="다음">
        </form>
    </div>
</body>
</html>
