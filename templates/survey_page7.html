<!DOCTYPE html>
<html>
<head>
    <title>기숙사 룸메이트 설문지 - 페이지 7</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f7f7f7;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        input[type="submit"] {
            width: auto;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 4px;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>기숙사 룸메이트 설문지 - 페이지 7</h1>
        <form action="" method="post">
            <div class="form-group">
                <label for="indoor_dining">실내취식:</label>
                <select id="indoor_dining" name="indoor_dining">
                    <option value="X">X</option>
                    <option value="환기잘하고 바로치우면 가능">환기잘하고 바로치우면 가능</option>
                    <option value="상관없음">상관없음</option>
                </select>
            </div>
            <div class="form-group">
                <label for="late_night_snack">야식:</label>
                <select id="late_night_snack" name="late_night_snack">
                    <option value="X">X</option>
                    <option value="별로">별로</option>
                    <option value="중간">중간</option>
                    <option value="좋아">좋아</option>
                    <option value="자주">자주</option>
                </select>
            </div>
            <div class="form-group">
                <label for="bug_handling">벌레:</label>
                <select id="bug_handling" name="bug_handling">
                    <option value="못잡음">못잡음</option>
                    <option value="작은거가능">작은거가능</option>
                    <option value="벌레헌터">벌레헌터</option>
                </select>
            </div>
            <input type="submit" value="다음">
        </form>
    </div>
</body>
</html>
