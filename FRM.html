<!DOCTYPE html>
<html>
<head>
    <title>Dorm Roommate Survey</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        input[type="submit"] {
            width: auto;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Dorm Roommate Survey</h1>
    <form id="surveyForm">
        <label for="dormitory">Dormitory:</label>
        <select id="dormitory" name="dormitory">
            <option value="Dorm A">Dorm A</option>
            <option value="Dorm B">Dorm B</option>
            <option value="Dorm C">Dorm C</option>
            <option value="Dorm D">Dorm D</option>
            <option value="Dorm E">Dorm E</option>
        </select>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label for="birth_year">Birth Year:</label>
        <input type="number" id="birth_year" name="birth_year">

        <label for="student_id">Student ID:</label>
        <input type="number" id="student_id" name="student_id">

        <label for="mbti">MBTI:</label>
        <select id="mbti" name="mbti">
            <option value="I">I</option>
            <option value="E">E</option>
            <option value="N">N</option>
            <option value="S">S</option>
            <option value="F">F</option>
            <option value="T">T</option>
            <option value="P">P</option>
            <option value="J">J</option>
        </select>

        <label for="college">College:</label>
        <select id="college" name="college">
            <option value="Science and Engineering">Science and Engineering</option>
            <option value="Arts and Humanities">Arts and Humanities</option>
            <option value="Sports and Health">Sports and Health</option>
            <option value="Confidential">Confidential</option>
        </select>

        <label for="bedtime">Bedtime:</label>
        <input type="time" id="bedtime" name="bedtime">

        <label for="lights_off">Lights Off:</label>
        <input type="time" id="lights_off" name="lights_off">

        <label for="wakeup_time">Wakeup Time:</label>
        <input type="time" id="wakeup_time" name="wakeup_time">

        <label for="cleaning_habits">Cleaning Habits:</label>
        <select id="cleaning_habits" name="cleaning_habits">
            <option value="As needed">As needed</option>
            <option value="Daily">Daily</option>
            <option value="Regularly">Regularly</option>
            <option value="All at once">All at once</option>
        </select>

        <label for="floor_preference">Floor Preference:</label>
        <select id="floor_preference" name="floor_preference">
            <option value="Mattress">Mattress</option>
            <option value="Bare floor">Bare floor</option>
        </select>

        <label for="sleep_habits">Sleep Habits:</label>
        <select id="sleep_habits" name="sleep_habits">
            <option value="None">None</option>
            <option value="Teeth grinding">Teeth grinding</option>
            <option value="Snoring">Snoring</option>
            <option value="Sleep talking">Sleep talking</option>
        </select>

        <label for="sleep_sensitivity">Sleep Sensitivity (1-5):</label>
        <input type="number" id="sleep_sensitivity" name="sleep_sensitivity" min="1" max="5">

        <label for="morning_alarm">Morning Alarm:</label>
        <select id="morning_alarm" name="morning_alarm">
            <option value="None">None</option>
            <option value="Turn off immediately">Turn off immediately</option>
            <option value="Need discussion">Need discussion</option>
            <option value="Doesn't matter">Doesn't matter</option>
        </select>

        <label for="smoking">Smoking:</label>
        <select id="smoking" name="smoking">
            <option value="No">No</option>
            <option value="Occasionally">Occasionally</option>
            <option value="Yes">Yes</option>
        </select>

        <label for="drinking_frequency">Drinking Frequency:</label>
        <select id="drinking_frequency" name="drinking_frequency">
            <option value="No">No</option>
            <option value="Often">Often</option>
            <option value="Sometimes">Sometimes</option>
            <option value="Daily">Daily</option>
        </select>

        <label for="drinking_habits">Drinking Habits:</label>
        <textarea id="drinking_habits" name="drinking_habits"></textarea>

        <label for="bug_handling">Bug Handling:</label>
        <select id="bug_handling" name="bug_handling">
            <option value="Can't catch">Can't catch</option>
            <option value="Small ones only">Small ones only</option>
            <option value="Bug hunter">Bug hunter</option>
        </select>

        <label for="roommate_relationship">Roommate Relationship:</label>
        <select id="roommate_relationship" name="roommate_relationship">
            <option value="Friendly">Friendly</option>
            <option value="Independent">Independent</option>
        </select>

        <label for="phone_calls">Phone Calls:</label>
        <select id="phone_calls" name="phone_calls">
            <option value="Only outside">Only outside</option>
            <option value="Brief calls allowed">Brief calls allowed</option>
            <option value="Doesn't matter">Doesn't matter</option>
        </select>

        <label for="phone_sound">Phone Sound:</label>
        <select id="phone_sound" name="phone_sound">
            <option value="Always use earphones">Always use earphones</option>
            <option value="Low volume allowed">Low volume allowed</option>
            <option value="Shared music allowed">Shared music allowed</option>
        </select>

        <label for="item_sharing">Item Sharing:</label>
        <select id="item_sharing" name="item_sharing">
            <option value="No">No</option>
            <option value="With permission">With permission</option>
            <option value="Doesn't matter">Doesn't matter</option>
            <option value="Common items provided">Common items provided</option>
        </select>

        <label for="indoor_dining">Indoor Dining:</label>
        <select id="indoor_dining" name="indoor_dining">
            <option value="No">No</option>
            <option value="With ventilation and cleanup">With ventilation and cleanup</option>
            <option value="Doesn't matter">Doesn't matter</option>
        </select>

        <label for="late_night_snack">Late Night Snack:</label>
        <select id="late_night_snack" name="late_night_snack">
            <option value="No">No</option>
            <option value="Rarely">Rarely</option>
            <option value="Sometimes">Sometimes</option>
            <option value="Often">Often</option>
        </select>

        <label for="return_frequency">Return Frequency:</label>
        <select id="return_frequency" name="return_frequency">
            <option value="Weekly">Weekly</option>
            <option value="Biweekly">Biweekly</option>
            <option value="Monthly">Monthly</option>
        </select>

        <label for="additional_notes">Additional Notes:</label>
        <textarea id="additional_notes" name="additional_notes"></textarea>

        <input type="submit" value="Submit">
    </form>

    <canvas id="resultCanvas" width="800" height="1200"></canvas>

    <script>
        document.getElementById('surveyForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000000';
            ctx.font = '16px Arial';

            const formData = new FormData(event.target);
            let yPosition = 20;
            formData.forEach((value, key) => {
                ctx.fillText(`${key}: ${value}`, 10, yPosition);
                yPosition += 20;
            });

            const link = document.createElement('a');
            link.download = 'survey_result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
